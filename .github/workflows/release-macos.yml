# Canonical signed and notarized macOS release.
#
# Required repository secrets:
#   BUILD_CERTIFICATE_BASE64  Developer ID Application certificate + private key (.p12), base64 encoded
#   P12_PASSWORD              Password protecting the .p12
#   ASC_KEY_ID                App Store Connect API key ID
#   ASC_KEY_ISSUER_ID         App Store Connect issuer UUID
#   ASC_KEY_P8                Full contents of the App Store Connect .p8 private key
#
# Optional:
#   CODESIGN_IDENTITY         Full Developer ID Application identity. The workflow auto-detects it when omitted.

name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.2.7)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Resolve checkout ref
        id: checkout_ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=refs/tags/${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.checkout_ref.outputs.ref }}

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          expected="v$(tr -d '[:space:]' < WindowSnap/VERSION)"
          [[ "$tag" == "$expected" ]] || {
            echo "Tag $tag does not match WindowSnap/VERSION ($expected)." >&2
            exit 1
          }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Resolve Developer ID identity
        id: signing
        shell: bash
        env:
          EXPLICIT_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          identity="$EXPLICIT_IDENTITY"
          if [[ -z "$identity" ]]; then
            identity="$(security find-identity -v -p codesigning 2>/dev/null | \
              sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | \
              awk 'NR == 1 { first = $0 } END { print first }')"
          fi
          [[ "$identity" == Developer\ ID\ Application:* ]] || {
            echo 'No Developer ID Application identity found after certificate import.' >&2
            exit 1
          }
          echo "identity=$identity" >> "$GITHUB_OUTPUT"

      - name: Run canonical production release
        working-directory: WindowSnap
        shell: bash
        env:
          CODESIGN_ID: ${{ steps.signing.outputs.identity }}
          NOTARY_PROFILE: windowsnap-ci
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_ISSUER_ID: ${{ secrets.ASC_KEY_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          key_file="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$ASC_KEY_P8" > "$key_file"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$key_file" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_KEY_ISSUER_ID"
          ./scripts/release.sh --publish
